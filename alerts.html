<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Active and recent service notices for CoastPulse Transit Atlas regions." />
    <title>CoastPulse Transit Atlas | Alerts</title>
    <link rel="icon" href="./assets/img/app-icon.png" />
    <link rel="apple-touch-icon" href="./assets/img/app-icon-192.png" />
    <link rel="stylesheet" href="./assets/css/styles.css?v=20260714b" />
    <link rel="stylesheet" href="./assets/css/themes.css?v=20260714b" />
    <script src="./assets/js/bootstrap.js?v=appearance-20260714"></script>
  </head>
  <body class="alerts-page-body">
    <div class="app-shell">
      <header class="site-header">
        <div class="brand-lockup">
          <div class="brand-mark" aria-hidden="true"></div>
          <div>
            <h1 data-brand-name>CoastPulse Transit Atlas</h1>
            <p data-brand-tagline>Unofficial map-first transit intelligence for SEQ</p>
          </div>
        </div>

        <nav class="top-nav" aria-label="Primary">
          <a href="./index.html">Map</a>
          <a href="./stops.html">Stops</a>
          <a href="./routes.html">Routes</a>
          <a href="./alerts.html" class="active">Alerts</a>
          <a href="./about.html">More</a>
        </nav>

        <p class="disclaimer-inline">Unofficial project. Not affiliated with Translink.</p>
      </header>

      <article class="static-page alerts-page">
        <section class="alerts-toolbar">
          <div>
            <h2 class="page-title-row">
              <span class="page-title-icon page-title-icon-alert" aria-hidden="true">
                <svg class="ui-icon" viewBox="0 0 24 24"><path d="M12 3 2 20h20L12 3Z"></path><path d="M12 9v5"></path><path d="M12 17h.01"></path></svg>
              </span>
              Alerts
            </h2>
            <p>Visibility layer for current and recent disruptions across supported regions.</p>
            <div class="reference-tabs alert-reference-tabs" role="group" aria-label="Alert severity">
              <button type="button" class="active" data-alert-view="all" aria-pressed="true">All</button>
              <button type="button" data-alert-view="major" aria-pressed="false">Major</button>
              <button type="button" data-alert-view="minor" aria-pressed="false">Minor</button>
              <button type="button" data-alert-view="info" aria-pressed="false">Info</button>
            </div>
          </div>
          <div class="routes-controls">
            <label for="alerts-region-select" class="sr-only">Select region</label>
            <select id="alerts-region-select"></select>
            <label for="alerts-severity-filter" class="sr-only">Filter severity</label>
            <select id="alerts-severity-filter">
              <option value="all">All severities</option>
              <option value="major">Major</option>
              <option value="minor">Minor</option>
              <option value="info">Info</option>
            </select>
          </div>
        </section>

        <section id="alerts-summary" class="alert-summary"></section>

        <section>
          <h3>Active alerts</h3>
          <div id="alerts-active"></div>
        </section>

        <section>
          <h3>Recent alerts</h3>
          <div id="alerts-recent"></div>
        </section>
      </article>
    </div>

    <script type="module" src="./assets/js/alertsPage.js?v=20260715-live4"></script>
  </body>
</html>
