name: Live Data Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

concurrency:
  group: live-data-refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Fetch official Translink GTFS-RT feeds
        env:
          GTFSRT_TRIP_UPDATES_SOURCE: ${{ secrets.GTFSRT_TRIP_UPDATES_SOURCE }}
          GTFSRT_VEHICLE_POSITIONS_SOURCE: ${{ secrets.GTFSRT_VEHICLE_POSITIONS_SOURCE }}
          GTFSRT_SERVICE_ALERTS_SOURCE: ${{ secrets.GTFSRT_SERVICE_ALERTS_SOURCE }}
          GTFSRT_TRAM_TRIP_UPDATES_SOURCE: ${{ secrets.GTFSRT_TRAM_TRIP_UPDATES_SOURCE }}
          GTFSRT_TRAM_VEHICLE_POSITIONS_SOURCE: ${{ secrets.GTFSRT_TRAM_VEHICLE_POSITIONS_SOURCE }}
          GTFS_STATIC_STOPS_SOURCE: ${{ secrets.GTFS_STATIC_STOPS_SOURCE }}
          GTFS_STATIC_ROUTES_SOURCE: ${{ secrets.GTFS_STATIC_ROUTES_SOURCE }}
          GTFS_STATIC_TRIPS_SOURCE: ${{ secrets.GTFS_STATIC_TRIPS_SOURCE }}
          GTFS_ID_MAP_SOURCE: ${{ secrets.GTFS_ID_MAP_SOURCE }}
        run: npm run fetch:gtfsrt

      - name: Build live departures, vehicles, incidents, and alerts
        run: npm run build:live:gtfsrt

      - name: Validate generated data and freshness
        run: |
          npm run validate:data
          npm run validate:live:freshness

      - name: Upload refresh diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-refresh-${{ github.run_id }}
          path: raw/live/summary.gtfsrt.json
          if-no-files-found: ignore
          retention-days: 7

      - name: Commit updated live data
        run: |
          if git diff --quiet -- data/departures.live.json data/vehicles.live.json data/alerts.live.json data/live-status.json; then
            echo "No live data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/departures.live.json data/vehicles.live.json data/alerts.live.json data/live-status.json
          git commit -m "chore(data): refresh live transit data"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
