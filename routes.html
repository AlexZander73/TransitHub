<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Browse CoastPulse Transit route details for Gold Coast tram and major bus connectors." />
    <title>CoastPulse Transit | Routes</title>
    <link rel="stylesheet" href="./assets/css/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="site-header">
        <div class="brand-lockup">
          <div class="brand-mark" aria-hidden="true"></div>
          <div>
            <h1 data-brand-name>CoastPulse Transit</h1>
            <p id="region-tag">Gold Coast</p>
          </div>
        </div>

        <nav class="top-nav" aria-label="Primary">
          <a href="./index.html">Map</a>
          <a href="./routes.html" class="active">Routes</a>
          <a href="./how-it-works.html">How it works</a>
          <a href="./about.html">About</a>
        </nav>

        <p class="disclaimer-inline">Unofficial project. Not affiliated with Translink.</p>
      </header>

      <main class="routes-layout">
        <section class="routes-list-card" aria-label="Routes list">
          <div class="routes-card-header">
            <h2>Routes</h2>
          </div>
          <div id="routes-list"></div>
        </section>

        <section class="routes-detail-card" aria-label="Selected route details">
          <div class="routes-card-header">
            <h2>Route detail</h2>
          </div>
          <div id="route-detail"></div>
        </section>
      </main>

      <p class="footer-note">Route timings are approximate sample estimates in this MVP build.</p>
    </div>

    <script type="module" src="./assets/js/routesPage.js"></script>
  </body>
</html>
